# Tiny Tapeout project information
project:
  title:        "CFAR Radar Detection with Buzzer"
  author:       "Illamparuthi G"
  discord:      "" 
  description:  "CFAR based radar signal detection with buzzer alert output"
  language:     "Verilog"
  clock_hz:     10000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_"
  top_module:  "tt_um_example"

  # List your project's source files here
  source_files:
    - "project.v"
    - "cfar.v"
    - "buzzer.v"

# The pinout of your project
pinout:
  # Inputs
  ui[0]: "Radar sample bit 0"
  ui[1]: "Radar sample bit 1"
  ui[2]: "Radar sample bit 2"
  ui[3]: "Radar sample bit 3"
  ui[4]: "Radar sample bit 4"
  ui[5]: "Radar sample bit 5"
  ui[6]: "Radar sample bit 6"
  ui[7]: "Radar sample bit 7"

  # Outputs
  uo[0]: "CFAR detection buzzer output"
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
